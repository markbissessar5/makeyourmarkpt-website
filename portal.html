<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Your Mark — Client Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --panel:#f6f6f4; --panel2:#eeeeec; --raise:#ffffff;
    --ink:#111111; --muted:#6b6b6b; --faint:#9a9a9a;
    --line:#e4e4e1; --line2:#d4d4d0;
    --red:#c8102e; --red-d:#a50d26; --black:#000000;
    --display:'Barlow Condensed',system-ui,sans-serif;
    --body:'Barlow',system-ui,sans-serif;
    --mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  [hidden]{display:none !important}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  ::selection{background:var(--red);color:#fff}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}
  h1,h2,h3,.logo{font-family:var(--display);letter-spacing:-0.01em}

  /* buttons */
  .btn{background:var(--red);color:#fff;font-family:var(--display);font-weight:700;font-size:16px;
    letter-spacing:.02em;text-transform:uppercase;padding:12px 22px;border-radius:8px;transition:.15s}
  .btn:hover{background:var(--red-d)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line2)}
  .btn.ghost:hover{background:var(--panel2);border-color:var(--ink)}
  .btn.sm{font-size:13px;padding:8px 14px}

  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .loginbox{width:100%;max-width:400px;text-align:center}
  .loginbox .logo{font-size:40px;font-weight:800;text-transform:uppercase;line-height:.95}
  .loginbox .logo .dot{color:var(--red)}
  .loginbox .tag{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin:10px 0 28px}
  .loginbox h2{font-size:26px;font-weight:700;margin-bottom:6px}
  .loginbox p{color:var(--muted);margin-bottom:22px}
  .loginform{display:flex;flex-direction:column;gap:12px}
  .loginform input{background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:14px 16px;font-size:16px;color:var(--ink)}
  .loginform input:focus{outline:none;border-color:var(--red)}
  .msg{margin-top:18px;font-size:14px;padding:12px 14px;border-radius:8px}
  .msg.ok{background:#f0f7f0;color:#2e6b2e;border:1px solid #cfe6cf}
  .msg.err{background:#fbeeef;color:var(--red-d);border:1px solid #f0d2d6}
  .booting{min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--mono);font-size:13px;letter-spacing:.05em}

  /* header */
  header{position:sticky;top:0;z-index:30;background:var(--black);color:#fff}
  .bar{display:flex;align-items:center;gap:16px;padding:12px 0;flex-wrap:wrap}
  .logo.top{font-size:24px;font-weight:800;text-transform:uppercase;color:#fff;line-height:1;margin-right:auto}
  .logo.top .dot{color:var(--red)}
  nav{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:999px;padding:4px}
  .tab{font-family:var(--display);font-weight:600;font-size:14px;letter-spacing:.04em;text-transform:uppercase;
    color:rgba(255,255,255,.7);padding:8px 16px;border-radius:999px;transition:.15s;white-space:nowrap}
  .tab:hover{color:#fff}
  .tab.on{background:var(--red);color:#fff}
  .who{display:flex;align-items:center;gap:12px;font-size:14px;color:rgba(255,255,255,.85)}
  .logout{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55)}
  .logout:hover{color:#fff}

  main{padding:32px 0 80px;min-height:60vh}
  .head{margin-bottom:24px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:6px}
  h1{font-weight:800;font-size:clamp(30px,5vw,44px);text-transform:uppercase;line-height:.98}
  .sub{color:var(--muted);margin-top:8px;max-width:60ch}

  /* workout */
  .workout{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px 30px;max-width:760px}
  .wsesslist{display:flex;flex-direction:column;gap:12px;max-width:760px}
  .wsess{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 20px}
  .wsess.today{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}
  .wsess.past{opacity:.65}
  .wsesshead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .wsessdate{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--red)}
  .wsesstitle{font-family:var(--display);font-weight:800;font-size:22px;text-transform:uppercase;line-height:1}
  .wxline{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line);cursor:pointer}
  .wxline:hover .wxname{color:var(--red)}
  .wxname{font-weight:600;font-size:15px}
  .wxplay{color:var(--red);font-size:11px}
  .wxrx{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
  .wxnote{font-size:13px;color:var(--faint);padding:2px 0 8px}
  .pastlabel{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:26px 0 10px}
  .wvid{width:100%;aspect-ratio:16/9;border:none;border-radius:10px;background:var(--panel2)}
  .wimgs{display:flex;gap:10px}
  .wimgs img{width:calc(50% - 5px);border-radius:10px;border:1px solid var(--line)}
  .workout p{margin:0 0 12px}
  .workout h1,.workout h2,.workout h3{text-transform:none;letter-spacing:0;margin:18px 0 8px}
  .workout table{border-collapse:collapse;margin:14px 0;width:100%}
  .workout td,.workout th{border:1px solid var(--line2);padding:7px 10px;font-size:14px}
  .workout ul,.workout ol{margin:8px 0 8px 22px}

  /* week */
  .weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  @media(max-width:760px){.weekgrid{grid-template-columns:repeat(2,1fr)}}
  .day{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:190px;display:flex;flex-direction:column}
  .day.today{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}
  .dname{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
  .dcal{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:10px}
  .meal{background:var(--raise);border:1px solid var(--line2);border-radius:9px;padding:8px 9px;margin-bottom:7px;position:relative}
  .meal .t{font-size:13px;font-weight:600;line-height:1.25;padding-right:14px;cursor:pointer}
  .meal .x{position:absolute;top:5px;right:5px;color:var(--faint);font-size:15px;line-height:1;width:16px;height:16px}
  .meal .x:hover{color:var(--red)}
  .addmeal{margin-top:auto;font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.04em;
    color:var(--muted);border:1px dashed var(--line2);border-radius:9px;padding:9px;text-transform:uppercase}
  .addmeal:hover{color:var(--ink);border-color:var(--red);background:#fdf0f1}
  .weektotal{display:flex;flex-wrap:wrap;gap:22px;margin-top:20px;padding:18px 20px;background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .stat .n{font-family:var(--display);font-size:26px;font-weight:800;line-height:1}
  .stat .n .u{font-size:13px;color:var(--muted);font-weight:600}
  .stat .l{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:5px}

  /* recipes */
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:11px 14px;color:var(--ink);font-size:14px}
  .search:focus{outline:none;border-color:var(--red)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .filter{font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--line2);border-radius:999px;padding:7px 14px;transition:.15s}
  .filter:hover{border-color:var(--ink);color:var(--ink)}
  .filter.on{background:var(--black);color:#fff;border-color:var(--black)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:.18s}
  .card:hover{border-color:var(--line2);transform:translateY(-2px)}
  .card .top{padding:16px 16px 12px;cursor:pointer}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .pill{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--red-d);border:1px solid #eccdd2;background:#fdf3f4;border-radius:999px;padding:3px 8px}
  .card h3{font-weight:700;font-size:21px;text-transform:uppercase;line-height:1.04}
  .card .d{color:var(--muted);font-size:13px;margin-top:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .nut{display:flex;gap:14px;padding:11px 16px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted)}
  .nut b{color:var(--ink);font-weight:700}
  .acts{display:flex;border-top:1px solid var(--line)}
  .acts button{flex:1;padding:11px;font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);transition:.15s}
  .acts button:hover{background:var(--panel2);color:var(--ink)}
  .acts button.cook{color:var(--red)}
  .acts button.cook:hover{background:var(--red);color:#fff}
  .acts button+button{border-left:1px solid var(--line)}
  .empty{text-align:center;padding:64px 20px;color:var(--muted);grid-column:1/-1}
  .empty .big{font-family:var(--display);font-size:24px;font-weight:700;text-transform:uppercase;color:var(--ink);margin-bottom:8px}

  /* shopping */
  .ticket{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:560px;overflow:hidden}
  .ticket .th{padding:18px 22px;border-bottom:1px dashed var(--line2);display:flex;justify-content:space-between;align-items:center}
  .ticket .th .t{font-family:var(--display);font-weight:800;font-size:20px;text-transform:uppercase}
  .ticket .th .c{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .cat{padding:14px 22px 4px;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red)}
  .item{display:flex;align-items:center;gap:12px;padding:9px 22px;cursor:pointer}
  .item:hover{background:var(--panel2)}
  .box{width:18px;height:18px;border:1.5px solid var(--line2);border-radius:5px;flex:none;display:flex;align-items:center;justify-content:center;transition:.15s}
  .item.done .box{background:var(--red);border-color:var(--red)}
  .box svg{opacity:0;width:11px;height:11px}
  .item.done .box svg{opacity:1}
  .item .nm{font-size:14px}
  .item.done .nm{color:var(--faint);text-decoration:line-through}
  .item .amt{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .tf{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-top:1px dashed var(--line2)}
  .tf .c{font-size:11px;color:var(--faint)}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:640px){.overlay{align-items:center}}
  .sheet{background:var(--bg);width:100%;max-width:580px;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto}
  @media(min-width:640px){.sheet{border-radius:16px}}
  .sh{padding:24px 26px 18px;border-bottom:1px solid var(--line);position:relative}
  .close{position:absolute;top:16px;right:18px;font-size:26px;line-height:1;color:var(--faint)}
  .close:hover{color:var(--ink)}
  .sh h2{font-size:28px;font-weight:800;text-transform:uppercase;padding-right:30px;line-height:1}
  .meta{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:8px}
  .sb{padding:20px 26px}
  .sb h4{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
  .servings{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border-radius:10px;padding:12px 16px;margin-bottom:20px}
  .servings .lbl{font-family:var(--display);font-weight:600;text-transform:uppercase;font-size:15px}
  .stepper{display:flex;align-items:center;gap:14px}
  .stepper button{width:30px;height:30px;border-radius:8px;background:var(--raise);border:1px solid var(--line2);font-size:18px;font-weight:700}
  .stepper button:hover{border-color:var(--red);color:var(--red)}
  .stepper .v{font-family:var(--mono);font-weight:700;min-width:18px;text-align:center}
  .ing{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
  .ing:last-child{border-bottom:none}
  .ing .a{font-family:var(--mono);color:var(--muted)}
  .step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .step:last-child{border-bottom:none}
  .step .n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--black);color:#fff;font-family:var(--mono);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .step .st{font-family:var(--display);font-weight:600;font-size:16px}
  .step .sx{color:var(--muted);font-size:14px;margin-top:2px}
  .step .tm{font-family:var(--mono);font-size:11px;color:var(--red);margin-top:4px}
  .sheetacts{display:flex;gap:10px;flex-wrap:wrap;padding:18px 26px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--bg)}
  .dayselect{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .dayselect button{padding:12px 4px;border:1px solid var(--line2);border-radius:10px;font-family:var(--display);font-weight:600;text-transform:uppercase;font-size:14px}
  .dayselect button:hover{border-color:var(--red);color:var(--red)}
  .picklist{display:flex;flex-direction:column;gap:6px}
  .pickrow{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line2);border-radius:10px;text-align:left}
  .pickrow:hover{border-color:var(--red)}
  .pickrow .pt{font-weight:600}
  .pickrow .pc{font-family:var(--mono);font-size:12px;color:var(--muted)}

  /* cook mode */
  .cookmode{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column}
  .cookhead{background:var(--black);color:#fff;display:flex;align-items:center;gap:14px;padding:14px 20px}
  .cookhead .close{position:static;color:rgba(255,255,255,.7)}
  .cookhead .close:hover{color:#fff}
  .cookhead .ct{font-family:var(--display);font-weight:700;font-size:18px;text-transform:uppercase;margin-right:auto}
  .cookhead .cprog{font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.6)}
  .cookbody{flex:1;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:30px 20px}
  .cookcard{max-width:560px;width:100%;text-align:center}
  .cookcard .sn{font-family:var(--display);font-weight:800;font-size:clamp(24px,6vw,40px);text-transform:uppercase;line-height:1;margin-bottom:14px}
  .cookcard .stt{font-size:18px;color:var(--ink);line-height:1.6;margin-bottom:22px}
  .timer{margin:0 auto 18px;max-width:260px}
  .timer .clock{font-family:var(--mono);font-size:52px;font-weight:700;display:block;margin-bottom:12px}
  .timer.ring .clock{color:var(--red)}
  .tbtns{display:flex;gap:10px;justify-content:center}
  .ringbar{margin-top:18px}
  .cookfoot{display:flex;gap:12px;padding:16px 20px;border-top:1px solid var(--line)}
  .cookfoot .btn{flex:1;justify-content:center;text-align:center}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px}
  @keyframes sp{to{transform:rotate(360deg)}}

  [hidden]{display:none !important}
  #installBtn{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:#c8102e; color:#fff; border:none; border-radius:999px;
    padding:12px 24px; font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:600; letter-spacing:.5px; text-transform:uppercase;
    box-shadow:0 4px 12px rgba(0,0,0,.3); cursor:pointer; z-index:9999;
  }

  /* onboarding */
  .onboard{max-width:720px;margin:0 auto;padding:28px 0 60px}
  .oncard{background:var(--raise);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:18px}
  .oncard h2{font-size:28px;font-weight:800;text-transform:uppercase;margin-bottom:8px}
  .agreement{white-space:pre-wrap;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;max-height:46vh;overflow:auto;font-size:13px;line-height:1.6;margin:16px 0}
  .checks{display:flex;flex-direction:column;gap:10px;margin:14px 0}
  .checks label{display:flex;gap:10px;text-align:left;align-items:flex-start;font-size:14px}
  .checks input{margin-top:4px}
  .field{margin:12px 0;text-align:left}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .field input,.field textarea{width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:12px 14px;font-size:15px}
  .field textarea{min-height:90px;resize:vertical}
  .codebox{margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
  .codebox input{text-align:center;font-family:var(--mono);font-size:24px;letter-spacing:.25em}


  /* calendar-first dashboard */
  .todaygrid{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(280px,.8fr);gap:18px}
  @media(max-width:780px){.todaygrid{grid-template-columns:1fr}}
  .daypanel,.sidepanel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}
  .datehero{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px}
  .datehero .bigdate{font-family:var(--display);font-size:34px;font-weight:800;text-transform:uppercase;line-height:1}
  .datehero .full{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .timeline{display:flex;flex-direction:column;gap:9px}
  .timelineitem{background:var(--raise);border:1px solid var(--line2);border-radius:11px;padding:12px 14px;display:grid;grid-template-columns:74px 1fr auto;gap:12px;align-items:start}
  .timelineitem .time{font-family:var(--mono);font-size:11px;color:var(--red);padding-top:2px}
  .timelineitem .title{font-weight:700}
  .timelineitem .meta2{font-size:12px;color:var(--muted);margin-top:3px}
  .eventtype{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--line2);border-radius:999px;padding:3px 7px;color:var(--muted)}
  .planblock{border-top:1px solid var(--line);padding-top:15px;margin-top:15px}
  .planblock:first-child{border-top:0;padding-top:0;margin-top:0}
  .planblock h3{font-size:18px;text-transform:uppercase;margin-bottom:8px}
  .macrogrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .macro{background:var(--raise);border:1px solid var(--line);border-radius:9px;padding:10px}
  .macro b{font-family:var(--display);font-size:22px}
  .macro span{display:block;font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase}
  .calhead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
  .calnav{display:flex;gap:7px}
  .calweek{display:grid;grid-template-columns:repeat(7,1fr);gap:9px}
  @media(max-width:760px){.calweek{grid-template-columns:1fr}}
  .calday{background:var(--panel);border:1px solid var(--line);border-radius:13px;min-height:210px;padding:12px}
  .calday.today{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}

</style>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/icons/favicon-32.png" sizes="32x32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Make Your Mark">
</head>
<body>

<div id="boot" class="booting">Signing you in…</div>
<div id="login" hidden></div>

<div id="app" hidden>
  <header><div class="wrap bar">
    <div class="logo top">MAKE YOUR MARK<span class="dot">.</span></div>
    <nav id="nav"></nav>
    <div class="who"><span id="whoName"></span><a id="coachLink" class="logout" href="coach.html" hidden>Coach</a><button class="logout" data-act="logout">Log out</button></div>
  </div></header>
  <main><div class="wrap" id="view"></div></main>
</div>

<div id="modal"></div>
<div id="cook"></div>

<script>
/* ============ CONFIG ============ */
const API = 'https://script.google.com/macros/s/AKfycbyD8fPljDiT_HGMfxRGbPK7lQTyM82iWnu6s2hmu7CzmGgFfopLZ6DCwOn4Nf5ylKAEkg/exec';
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const FILTER_ORDER = ['keto','high-protein','low-carb','quick'];

/* ============ STATE ============ */
let SESSION = null;
let S = { name:'', workoutHtml:'', sessions:[], exlib:[], recipes:[], week:{}, dateMeals:{}, checked:{}, onboarding:{}, events:[], dailyPlans:{}, workoutLogs:[] };
let UI = { view:'today', search:'', filter:'', openId:null, detServings:null, pickDay:null, addRecipe:null, weekOffset:0, eventEdit:null, eventDate:null };
let COOK = null;
let WORK = null;
let audioCtx = null;
let saveTimer = null;

/* ============ API ============ */
async function api(payload){
  const r = await fetch(API, { method:'POST', body: JSON.stringify(payload) });
  return await r.json();
}

/* ============ BOOT / AUTH ============ */
(async function boot(){
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  if(token){
    history.replaceState({}, '', location.pathname);
    try{
      const res = await api({ action:'validate', token });
      if(res.ok){
        SESSION = res.session;
        try{ localStorage.setItem('mym_session', SESSION); }catch(e){}
        if(await loadData()){ showApp(); return; }
      }
    }catch(e){}
    showLogin('That link has expired or already been used. Enter your email below and we\u2019ll send a fresh one.');
    return;
  }
  try{ SESSION = localStorage.getItem('mym_session'); }catch(e){}
  if(SESSION){
    try{ if(await loadData()){ showApp(); return; } }catch(e){}
    try{ localStorage.removeItem('mym_session'); }catch(e){}
    SESSION = null;
  }
  showLogin();
})();

async function loadData(){
  const res = await api({ action:'data', session: SESSION });
  if(!res || !res.ok) return false;
  S.name = res.name || '';
  S.admin = !!res.admin;
  S.workoutHtml = res.workoutHtml || '';
  S.sessions = res.sessions || [];
  S.exlib = res.exercises || [];
  S.recipes = res.recipes || [];
  const sel = res.selections || {};
  S.week = sel.week || {};
  S.dateMeals = sel.dateMeals || {};
  S.checked = sel.checked || {};
  S.workoutLogs = res.workoutLogs || [];
  S.onboarding = res.onboarding || {};
  S.events = res.events || [];
  S.dailyPlans = res.dailyPlans || {};
  DAYS.forEach(d=>{ if(!Array.isArray(S.week[d])) S.week[d] = []; });
  return true;
}

function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    api({ action:'save', session: SESSION, selections:{ week:S.week, dateMeals:S.dateMeals, checked:S.checked } }).catch(()=>{});
  }, 600);
}

function logout(){
  try{ localStorage.removeItem('mym_session'); }catch(e){}
  SESSION = null; COOK = null;
  showLogin();
}

/* ============ SCREENS ============ */
function showLogin(msg){
  document.getElementById('boot').hidden = true;
  document.getElementById('app').hidden = true;
  const el = document.getElementById('login');
  el.hidden = false;
  el.innerHTML = `<div class="loginbox">
    <div class="logo">MAKE YOUR MARK<span class="dot">.</span></div>
    <div class="tag">Client Portal</div>
    <h2>Welcome back</h2>
    <p>Enter your email to receive a secure 6-digit login code.</p>
    <div class="loginform">
      <input id="emailIn" type="email" placeholder="you@email.com" autocomplete="email">
      <button class="btn" data-act="sendlink">Send login code</button>
    </div>
    <div class="codebox" id="codeBox" hidden>
      <p style="margin-bottom:10px">Enter the code from your email.</p>
      <div class="loginform">
        <input id="codeIn" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000">
        <button class="btn" data-act="verifycode">Sign in</button>
      </div>
    </div>
    <div id="loginMsg">${msg?`<div class="msg err">${esc(msg)}</div>`:''}</div>
  </div>`;
  const inp = document.getElementById('emailIn');
  if(inp){ inp.focus(); inp.addEventListener('keydown',e=>{ if(e.key==='Enter') sendLink(); }); }
}

async function sendLink(){
  const inp = document.getElementById('emailIn');
  const email = (inp ? inp.value : '').trim();
  const box = document.getElementById('loginMsg');
  if(!email || email.indexOf('@')<0){ box.innerHTML = '<div class="msg err">Please enter a valid email address.</div>'; return; }
  box.innerHTML = '<div class="msg">Sending…</div>';
  try{ await api({ action:'request', email }); }catch(e){}
  box.innerHTML = '<div class="msg ok">If that email has access, a 6-digit code and login link are on their way. Check your inbox and spam.</div>';
  const cb=$('codeBox'); if(cb) cb.hidden=false;
  const ci=$('codeIn'); if(ci){ ci.focus(); ci.addEventListener('keydown',e=>{if(e.key==='Enter') verifyCode();}); }
}

async function verifyCode(){
  const email=($('emailIn')?$('emailIn').value:'').trim();
  const code=($('codeIn')?$('codeIn').value:'').replace(/\D/g,'');
  const box=$('loginMsg');
  if(!email || code.length!==6){ box.innerHTML='<div class="msg err">Enter your email and the 6-digit code.</div>'; return; }
  box.innerHTML='<div class="msg">Signing in…</div>';
  try{
    const res=await api({action:'verify_code',email,code});
    if(res.ok){ SESSION=res.session; try{localStorage.setItem('mym_session',SESSION);}catch(e){} if(await loadData()){showApp();return;} }
  }catch(e){}
  box.innerHTML='<div class="msg err">That code is invalid or has expired. Request a new one.</div>';
}

function showApp(){
  document.getElementById('boot').hidden = true;
  document.getElementById('login').hidden = true;
  document.getElementById('app').hidden = false;
  document.getElementById('whoName').textContent = S.name ? ('Hi, ' + S.name) : '';
  document.getElementById('coachLink').hidden = !S.admin;
  if(S.onboarding && (S.onboarding.agreementRequired || S.onboarding.profileRequired)) renderOnboarding(); else render();
}

function renderOnboarding(){
  $('nav').innerHTML='';
  $('whoName').textContent=S.name?('Hi, '+S.name):'';
  const v=$('view');
  if(S.onboarding.agreementRequired){
    v.innerHTML=`<div class="onboard"><div class="eyebrow">Welcome to coaching</div><h1>Before you begin</h1>
      <p class="sub">Review and accept the coaching service agreement to activate your account.</p>
      <div class="oncard"><h2>Coaching service agreement</h2>
        <div class="agreement">${esc(S.onboarding.agreementText||'')}</div>
        <div class="checks">
          <label><input id="agree18" type="checkbox"> <span>I confirm that I am at least 18 years old.</span></label>
          <label><input id="agreeTerms" type="checkbox"> <span>I have read and agree to the coaching service agreement.</span></label>
        </div>
        <div class="field"><label>Type your full legal name</label><input id="acceptedName" autocomplete="name" placeholder="Full name"></div>
        <div id="onMsg"></div>
        <button class="btn" data-act="acceptagreement">Accept and continue</button>
      </div></div>`;
    return;
  }
  const p=S.onboarding.profile||{};
  v.innerHTML=`<div class="onboard"><div class="eyebrow">Set up your profile</div><h1>Tell Mark what matters</h1>
    <p class="sub">This information helps Mark programme safely and tailor your coaching.</p>
    <div class="oncard">
      <div class="field"><label>Mobile number</label><input id="p_phone" value="${esc(p.phone||'')}" autocomplete="tel"></div>
      <div class="field"><label>Date of birth</label><input id="p_dob" type="date" value="${esc(p.dob||'')}"></div>
      <div class="field"><label>Emergency contact</label><input id="p_emergency" value="${esc(p.emergency||'')}" placeholder="Name and phone number"></div>
      <div class="field"><label>Injuries, medical considerations or dietary restrictions</label><textarea id="p_medical" placeholder="Include anything Mark should know before programming.">${esc(p.medical||'')}</textarea></div>
      <div class="field"><label>Primary sport and current goals</label><textarea id="p_goals" placeholder="e.g. rugby, improve speed and strength before next season">${esc(p.goals||'')}</textarea></div>
      <div id="onMsg"></div><button class="btn" data-act="saveprofile">Save and enter portal</button>
    </div></div>`;
}

async function acceptAgreement(){
  const name=($('acceptedName')?$('acceptedName').value:'').trim(); const box=$('onMsg');
  if(!$('agree18').checked || !$('agreeTerms').checked || name.length<2){box.innerHTML='<div class="msg err">Confirm both boxes and type your full name.</div>';return;}
  box.innerHTML='<div class="msg">Saving acceptance…</div>';
  const res=await api({action:'accept_agreement',session:SESSION,acceptedName:name,confirm18:true,userAgent:navigator.userAgent});
  if(!res.ok){box.innerHTML='<div class="msg err">We could not save your acceptance. Try again.</div>';return;}
  S.onboarding.agreementRequired=false; renderOnboarding();
}
async function saveProfile(){
  const profile={phone:$('p_phone').value.trim(),dob:$('p_dob').value,emergency:$('p_emergency').value.trim(),medical:$('p_medical').value.trim(),goals:$('p_goals').value.trim()};
  const box=$('onMsg'); box.innerHTML='<div class="msg">Saving profile…</div>';
  const res=await api({action:'save_profile',session:SESSION,profile});
  if(!res.ok){box.innerHTML='<div class="msg err">We could not save your profile. Try again.</div>';return;}
  S.onboarding.profileRequired=false; S.onboarding.profile=profile; render();
}

/* ============ HELPERS ============ */
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId = id => S.recipes.find(r=>r.id===id);
function fmtNum(n){ if(n==null||isNaN(n))return''; return ''+(Math.round(n*100)/100); }
function fmtAmt(ing,scale){ const a=fmtNum((ing.amount||0)*(scale||1)); return (a?a+' ':'')+(ing.unit||''); }
function clock(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }
function dayCals(day){ return (S.week[day]||[]).reduce((t,id)=>{const r=byId(id);return t+(r&&r.nutrition?r.nutrition.calories||0:0);},0); }
function todayName(){ return DAYS[(new Date().getDay()+6)%7]; }
const wxById = id => S.exlib.find(x=>x.id===id);
function ytId(url){ const m=(url||'').match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{6,})/); return m?m[1]:null; }
function driveId(url){ const m=(url||'').match(/drive\.google\.com\/file\/d\/([\w-]+)/); return m?m[1]:null; }
function embedFor(url){
  const y=ytId(url); if(y) return 'https://www.youtube.com/embed/'+y;
  const d=driveId(url); if(d) return 'https://drive.google.com/file/d/'+d+'/preview';
  return null;
}
function fmtDate(iso){ if(!iso)return''; const d=new Date(iso+'T12:00:00');
  return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'}); }
function isPastDay(iso){ const t=new Date(); t.setHours(0,0,0,0); return new Date(iso+'T12:00:00') < t; }
function isToday(iso){ return iso===new Date().toISOString().slice(0,10); }
function rxText(e){
  const bits=[];
  if(e.sets&&e.reps) bits.push(e.sets+'\u00d7'+e.reps); else if(e.sets) bits.push(e.sets+' sets'); else if(e.reps) bits.push(e.reps+' reps');
  if(e.rest) bits.push(e.rest+'s rest');
  return bits.join(' \u00b7 ');
}


function isoDate(d){ return d.toISOString().slice(0,10); }
function localDateISO(d){ const x=new Date(d); x.setMinutes(x.getMinutes()-x.getTimezoneOffset()); return x.toISOString().slice(0,10); }
function startOfWeek(offset){
  const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)+(offset||0)*7); return d;
}
function dateLabel(iso,opts){ const d=new Date(iso+'T12:00:00'); return d.toLocaleDateString('en-AU',opts||{weekday:'short',day:'numeric',month:'short'}); }
function eventDay(e){ return String(e.start||'').slice(0,10); }
function timeLabel(value,allDay){ if(allDay)return'All day'; const m=String(value||'').match(/T(\d\d):(\d\d)/); if(!m)return''; const d=new Date('2000-01-01T'+m[1]+':'+m[2]); return d.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit'}); }
function eventsForDate(date){ return S.events.filter(e=>eventDay(e)===date).sort((a,b)=>String(a.start).localeCompare(String(b.start))); }
function sessionsForDate(date){ return S.sessions.filter(s=>s.date===date); }
function openEvent(id,date){ UI.eventEdit=id?S.events.find(e=>e.id===id):null; UI.eventDate=date||localDateISO(new Date()); renderModal(); }

function mealsForDate(date){
  if(Array.isArray(S.dateMeals[date])) return S.dateMeals[date];
  const d=new Date(date+'T12:00:00'), day=DAYS[(d.getDay()+6)%7];
  return S.week[day]||[];
}
function nutritionForDate(date){
  const total={calories:0,protein:0,carbs:0,fat:0};
  mealsForDate(date).forEach(id=>{const r=byId(id),n=r&&r.nutrition||{};total.calories+=Number(n.calories)||0;total.protein+=Number(n.protein)||0;total.carbs+=Number(n.carbs)||0;total.fat+=Number(n.fat)||0;});
  return total;
}
function nutritionStatus(actual,target){
  const keys=['calories','protein','carbs','fat'].filter(k=>Number(target[k])>0);
  if(!keys.length)return'No target';
  if(!keys.some(k=>actual[k]>0))return'No meals planned';
  const close=keys.every(k=>Math.abs(actual[k]-Number(target[k]))/Number(target[k])<=.1);
  if(close)return'On target';
  const mostlyUnder=keys.filter(k=>actual[k]<Number(target[k])*.9).length>=Math.ceil(keys.length/2);
  return mostlyUnder?'Under target':'Review plan';
}
function compareNutritionHtml(date,compact){
  const a=nutritionForDate(date),t=S.dailyPlans[date]||{}, keys=[
    ['calories','Calories','kcal'],['protein','Protein','g'],['carbs','Carbs','g'],['fat','Fat','g']
  ];
  if(!keys.some(([k])=>Number(t[k])>0)) return compact?'':'<div class="empty">Mark has not set nutrition targets for this date yet.</div>';
  const rows=keys.filter(([k])=>Number(t[k])>0).map(([k,label,u])=>{
    const av=Math.round(a[k]),tv=Math.round(Number(t[k])),diff=tv-av,pct=Math.min(100,Math.round(av/tv*100)),over=av>tv;
    return `<div class="nrow"><div class="nlabel">${label}</div><div><div class="ntrack"><div class="nfill ${over?'over':''}" style="width:${pct}%"></div></div><div style="font-family:var(--mono);font-size:11px;margin-top:4px">${av} / ${tv} ${u}</div></div><div class="ndiff">${diff>=0?diff+' '+u+' remaining':Math.abs(diff)+' '+u+' above'}</div></div>`;
  }).join('');
  return compact?`<span class="nutritionstatus">${nutritionStatus(a,t)}</span>`:`<div class="nutritioncompare"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><h3 style="text-transform:uppercase">Nutrition progress</h3><span class="nutritionstatus">${nutritionStatus(a,t)}</span></div>${rows}</div>`;
}

function viewToday(){
  const date=localDateISO(new Date()), ev=eventsForDate(date), sess=sessionsForDate(date), p=S.dailyPlans[date]||{};
  const timeline=[
    ...sess.map(s=>({kind:'workout',time:'Coach plan',title:s.title||'Workout',meta:(s.exercises||[]).length+' exercises'})),
    ...ev.map(e=>({kind:'event',id:e.id,time:timeLabel(e.start,e.allDay),title:e.title,meta:[e.type,e.location,e.intensity].filter(Boolean).join(' · '),createdBy:e.createdBy}))
  ];
  timeline.sort((a,b)=>String(a.time).localeCompare(String(b.time)));
  return `<div class="head"><div class="eyebrow">Today</div><h1>Your performance day</h1>
    <p class="sub">Training, sport, nutrition and recovery in one place.</p></div>
    <div class="todaygrid"><section class="daypanel">
      <div class="datehero"><div><div class="bigdate">${dateLabel(date,{weekday:'long'})}</div><div class="full">${dateLabel(date,{day:'numeric',month:'long',year:'numeric'})}</div></div>
      <button class="btn sm" data-act="addevent" data-date="${date}">+ Add event</button></div>
      <div class="timeline">${timeline.length?timeline.map(x=>x.kind==='workout'
        ?`<div class="timelineitem"><div class="time">Workout</div><div><div class="title">${esc(x.title)}</div><div class="meta2">${esc(x.meta)}</div></div><span class="eventtype">Coach</span></div>`
        :`<div class="timelineitem" data-act="editevent" data-id="${esc(x.id)}"><div class="time">${esc(x.time)}</div><div><div class="title">${esc(x.title)}</div><div class="meta2">${esc(x.meta)}</div></div><span class="eventtype">${esc(x.createdBy||'client')}</span></div>`).join('')
        :'<div class="empty">Nothing planned yet. Add training, a match, race, travel or another commitment.</div>'}</div>
    </section><aside class="sidepanel">
      <div class="planblock"><h3>${esc(p.dayType||'Daily plan')}</h3>
        <div class="macrogrid">
          <div class="macro"><b>${p.calories||'—'}</b><span>Calories</span></div>
          <div class="macro"><b>${p.protein||'—'}${p.protein?'g':''}</b><span>Protein</span></div>
          <div class="macro"><b>${p.carbs||'—'}${p.carbs?'g':''}</b><span>Carbs</span></div>
          <div class="macro"><b>${p.fat||'—'}${p.fat?'g':''}</b><span>Fat</span></div>
        </div></div>
      ${p.hydration?`<div class="planblock"><h3>Hydration</h3><p>${esc(p.hydration)}</p></div>`:''}

function sessionByRunnerId(id){return S.sessions.find(s=>(s.id||('session_'+(s.date||'')+'_'+(s.title||'').replace(/\W/g,'_')))===id);}
function workoutSequence(session){
  const ex=session.exercises||[], groups=[], seen={};
  ex.forEach((e,i)=>{
    const gid=e.groupId||('solo_'+i),type=e.groupType||'straight';
    if(!seen[gid]){seen[gid]={id:gid,type,rounds:Number(e.rounds)||Number(e.sets)||1,restAfterRound:Number(e.restAfterRound)||Number(e.rest)||0,items:[]};groups.push(seen[gid]);}
    seen[gid].items.push({rx:e,x:wxById(e.exerciseId),sourceIndex:i});
  });
  const seq=[];
  groups.forEach(g=>{
    const rounds=Math.max(1,g.rounds);
    for(let r=1;r<=rounds;r++)g.items.forEach((item,j)=>seq.push({group:g,item,round:r,rounds,lastInRound:j===g.items.length-1}));
  });
  return seq;
}
function startWorkout(id){
  const session=sessionByRunnerId(id);if(!session)return;
  const sequence=workoutSequence(session);if(!sequence.length)return;
  WORK={session,id,sequence,index:0,startedAt:new Date(),timer:null,running:false,remaining:0,phase:'exercise',results:[],finished:false};
  setRunnerTimer();renderWorkout();
}
function runnerStep(){return WORK&&WORK.sequence[WORK.index];}
function setRunnerTimer(){
  const st=runnerStep();if(!st)return;
  clearWorkoutTimer();WORK.phase='exercise';WORK.remaining=Number(st.item.rx.duration)||0;WORK.running=false;
}
function clearWorkoutTimer(){if(WORK&&WORK.timer){clearInterval(WORK.timer);WORK.timer=null;}}
function runnerTick(){if(!WORK)return;WORK.remaining--;if(WORK.remaining<=0){WORK.remaining=0;WORK.running=false;clearWorkoutTimer();beep();if(navigator.vibrate)navigator.vibrate([150,80,150]);}renderWorkout();}
function toggleWorkoutTimer(){if(!WORK||WORK.remaining<=0)return;if(WORK.running){WORK.running=false;clearWorkoutTimer();}else{WORK.running=true;WORK.timer=setInterval(runnerTick,1000);}renderWorkout();}
function completeRunnerStep(){
  const st=runnerStep(),reps=$('wr_reps'),load=$('wr_load');
  WORK.results.push({exerciseId:st.item.rx.exerciseId,round:st.round,reps:reps?reps.value:'',load:load?load.value:'',completed:true});
  const rest=st.lastInRound?Number(st.group.restAfterRound)||0:Number(st.item.rx.rest)||0;
  if(rest>0){WORK.phase='rest';WORK.remaining=rest;WORK.running=true;clearWorkoutTimer();WORK.timer=setInterval(runnerTick,1000);renderWorkout();return;}
  nextRunnerStep();
}
function nextRunnerStep(){
  clearWorkoutTimer();WORK.index++;
  if(WORK.index>=WORK.sequence.length){WORK.finished=true;renderWorkout();return;}
  setRunnerTimer();renderWorkout();
}
function skipRest(){if(!WORK)return;nextRunnerStep();}
async function finishWorkout(){
  const ended=new Date(),duration=Math.round((ended-WORK.startedAt)/1000);
  const log={sessionId:WORK.id,sessionDate:WORK.session.date,title:WORK.session.title,startedAt:WORK.startedAt.toISOString(),completedAt:ended.toISOString(),status:'completed',duration,
    data:{results:WORK.results},difficulty:+($('wf_diff')?.value||0),energy:$('wf_energy')?.value||'',pain:$('wf_pain')?.value||'',note:$('wf_note')?.value||''};
  const btn=$('finishWorkoutBtn');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const res=await api({action:'save_workout_log',session:SESSION,log});
  if(res.ok){S.workoutLogs.unshift({...log,id:res.id});clearWorkoutTimer();WORK=null;renderWorkout();render();}
}
function renderWorkout(){
  let root=$('workoutRunner');if(!root){root=document.createElement('div');root.id='workoutRunner';document.body.appendChild(root);}
  if(!WORK){root.innerHTML='';return;}
  if(WORK.finished){root.innerHTML=`<div class="workrunner"><div class="wrhead"><div class="wtitle">Workout complete</div></div><div class="wrbody"><div class="wrcard">
    <div class="wrblock">${esc(WORK.session.title||'Session')}</div><div class="wrexname">Nice work.</div>
    <div class="finishgrid"><div class="field"><label>Difficulty 1–10</label><input id="wf_diff" type="number" min="1" max="10"></div>
    <div class="field"><label>Energy</label><select id="wf_energy"><option>Low</option><option selected>Okay</option><option>High</option></select></div>
    <div class="field"><label>Any pain?</label><select id="wf_pain"><option>No</option><option>Yes</option></select></div>
    <div class="field"><label>Note to Mark</label><input id="wf_note"></div></div>
    <button id="finishWorkoutBtn" class="btn" data-act="finishworkout">Save workout</button></div></div></div>`;return;}
  const st=runnerStep(),x=st.item.x||{},rx=st.item.rx||{},groupName=st.group.type==='superset'?'Superset':st.group.type==='circuit'?'Circuit':'Exercise';
  if(WORK.phase==='rest'){root.innerHTML=`<div class="workrunner"><div class="wrhead"><div class="wtitle">${esc(WORK.session.title)}</div><div class="wrprogress">Rest</div></div><div class="wrbody"><div class="wrcard"><div class="wrblock">Recover</div><div class="wrexname">Rest</div><div class="wrtimer">${clock(WORK.remaining)}</div><button class="btn ghost" data-act="skiprest">Skip rest</button></div></div></div>`;return;}
  root.innerHTML=`<div class="workrunner"><div class="wrhead"><button class="close" style="position:static" data-act="closeworkout">×</button><div class="wtitle">${esc(WORK.session.title)}</div><div class="wrprogress">${WORK.index+1}/${WORK.sequence.length}</div></div>
    <div class="wrbody"><div class="wrcard"><div class="wrblock">${groupName}${st.group.type!=='straight'?' · Round '+st.round+' of '+st.rounds:''}</div>
      <div class="wrexname">${esc(x.name||'Exercise')}</div><div class="wrset">Set ${st.round} of ${st.rounds}</div>
      <div class="wrrx">${rx.duration?clock(rx.duration):esc(rx.reps||'')} ${rx.duration?'work':'reps'}${rx.note?' · '+esc(rx.note):''}</div>
      ${x.cues?`<div class="wrnote">${esc(x.cues)}</div>`:''}
      ${rx.duration?`<div class="wrtimer">${clock(WORK.remaining)}</div><button class="btn ${WORK.running?'ghost':''}" data-act="wrtimer">${WORK.running?'Pause':'Start timer'}</button>`:''}
      <div class="wrfields"><input id="wr_reps" placeholder="Actual reps" value="${esc(rx.reps||'')}"><input id="wr_load" placeholder="Weight / load"></div>
    </div></div><div class="wrfoot"><button class="btn ghost" data-act="closeworkout">Exit</button><button class="btn" data-act="completeset">Complete set →</button></div></div>`;
}

/* ============ COOK MODE ============ */
function renderCook(){
  const c = $('cook');
  if(!COOK){ c.innerHTML=''; return; }
  const r=COOK.recipe, step=r.steps[COOK.step], total=r.steps.length;
  const sc=COOK.servings/r.servings;
  const ingHtml=(r.ingredients||[]).map(i=>`<span><b>${esc(fmtAmt(i,sc)).trim()}</b> ${esc(i.name)}</span>`).join('  \u00b7  ');
  c.innerHTML=`<div class="cookmode">
    <div class="cookhead">
      <button class="close" data-act="cookclose">\u00d7</button>
      <span class="ct">${esc(r.title)}</span>
      <span class="cprog">Step ${COOK.step+1} / ${total}</span>
    </div>
    <div class="cookbody"><div class="cookcard">
      <div class="sn">${esc(step.title||('Step '+(COOK.step+1)))}</div>
      <div class="stt">${esc(step.text||'')}</div>
      ${step.timer?`<div class="timer ${COOK.rang?'ring':''}">
        <span class="clock">${clock(COOK.remaining)}</span>
        <div class="tbtns">
          <button class="btn sm" data-act="tstart">${COOK.running?'Pause':(COOK.remaining<=0?'Done':'Start')}</button>
          <button class="btn ghost sm" data-act="treset">Reset</button>
        </div></div>`:''}
      <div class="ringbar" style="font-size:12px;color:var(--faint);font-family:var(--mono)">${ingHtml}</div>
    </div></div>
    <div class="cookfoot">
      <button class="btn ghost" data-act="cprev" ${COOK.step===0?'disabled':''}>\u2190 Back</button>
      ${COOK.step<total-1?`<button class="btn" data-act="cnext">Next \u2192</button>`
        :`<button class="btn" data-act="cookclose">Finish \u2713</button>`}
    </div>
  </div>`;
}
function startCook(id){ const r=byId(id); if(!r)return; clearTimer();
  COOK={recipe:r,step:0,servings:r.servings,remaining:r.steps[0].timer||0,running:false,rang:false,intv:null};
  UI.openId=null; render(); }
function gotoStep(i){ if(!COOK)return; clearTimer();
  COOK.step=Math.max(0,Math.min(COOK.recipe.steps.length-1,i));
  COOK.remaining=COOK.recipe.steps[COOK.step].timer||0; COOK.running=false; COOK.rang=false; renderCook(); }
function clearTimer(){ if(COOK&&COOK.intv){ clearInterval(COOK.intv); COOK.intv=null; } }
function tickTimer(){ if(!COOK)return; COOK.remaining--;
  if(COOK.remaining<=0){ COOK.remaining=0; COOK.running=false; COOK.rang=true; clearTimer(); beep(); } renderCook(); }
function toggleTimer(){ if(!COOK)return;
  if(COOK.running){ COOK.running=false; clearTimer(); }
  else { if(COOK.remaining<=0){ renderCook(); return; } COOK.running=true; COOK.rang=false; COOK.intv=setInterval(tickTimer,1000); }
  renderCook(); }
function resetTimer(){ if(!COOK)return; clearTimer(); COOK.remaining=COOK.recipe.steps[COOK.step].timer||0; COOK.running=false; COOK.rang=false; renderCook(); }
function beep(){ try{ audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();
  let i=0; const ring=()=>{ if(i++>=3)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=880; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(.001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.3,audioCtx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.4); o.start(); o.stop(audioCtx.currentTime+.42);
    setTimeout(ring,520); }; ring(); }catch(e){} }

/* ============ EVENTS ============ */
document.addEventListener('click', e=>{
  if(e.target.classList.contains('overlay')||e.target.classList.contains('close')){
    UI.openId=null; UI.pickDay=null; UI.addRecipe=null; UI.openWx=null; UI.eventEdit=null; UI.eventDate=null; renderModal(); return; }
  const t = e.target.closest('[data-act]');
  if(!t) return;
  const act = t.dataset.act;
  switch(act){
    case 'sendlink': sendLink(); break;
    case 'verifycode': verifyCode(); break;
    case 'acceptagreement': acceptAgreement(); break;
    case 'saveprofile': saveProfile(); break;
    case 'logout': logout(); break;
    case 'nav': UI.view=t.dataset.k; UI.openId=null; render(); window.scrollTo(0,0); break;
    case 'prevweek': UI.weekOffset--; render(); break;
    case 'nextweek': UI.weekOffset++; render(); break;
    case 'thisweek': UI.weekOffset=0; render(); break;
    case 'addevent': UI.eventDate=t.dataset.date; UI.eventEdit=null; renderModal(); break;
    case 'editevent': UI.eventEdit=S.events.find(x=>x.id===t.dataset.id)||null; UI.eventDate=null; renderModal(); break;
    case 'saveevent': {
      const ev={id:t.dataset.id||'',title:$('ev_title').value.trim(),type:$('ev_type').value,start:$('ev_start').value,end:$('ev_end').value,
        allDay:$('ev_allday').checked,intensity:$('ev_intensity').value,location:$('ev_location').value.trim(),notes:$('ev_notes').value.trim()};
      const box=$('evMsg'); if(!ev.title||!ev.start){box.innerHTML='<div class="msg err">Add a title and start time.</div>';break;}
      t.disabled=true;t.textContent='Saving…'; const res=await api({action:'save_event',session:SESSION,event:ev});
      if(res.ok){const i=S.events.findIndex(x=>x.id===res.event.id);if(i>=0)S.events[i]=res.event;else S.events.push(res.event);UI.eventEdit=null;UI.eventDate=null;render();}
      else{t.disabled=false;t.textContent='Save event';box.innerHTML='<div class="msg err">Could not save the event.</div>';} break;}
    case 'deleteevent': {
      const res=await api({action:'delete_event',session:SESSION,id:t.dataset.id});
      if(res.ok){S.events=S.events.filter(x=>x.id!==t.dataset.id);UI.eventEdit=null;UI.eventDate=null;render();} break;}
    case 'open': UI.openId=t.dataset.id; UI.detServings=(byId(t.dataset.id)||{}).servings; renderModal(); break;
    case 'openwx': { let rx={}; try{rx=JSON.parse(t.dataset.rx||'{}');}catch(err){}
      UI.openWx={id:t.dataset.id,rx:rx}; renderModal(); break; }
    case 'cook': startCook(t.dataset.id); break;
    case 'startworkout': startWorkout(t.dataset.sid); break;
    case 'wrtimer': toggleWorkoutTimer(); break;
    case 'completeset': completeRunnerStep(); break;
    case 'skiprest': skipRest(); break;
    case 'finishworkout': finishWorkout(); break;
    case 'closeworkout': clearWorkoutTimer(); WORK=null; renderWorkout(); break;
    case 'addrec': UI.addRecipe=t.dataset.id; UI.openId=null; renderModal(); break;
    case 'confirmadd': S.week[t.dataset.d].push(UI.addRecipe); UI.addRecipe=null; save(); render(); break;
    case 'addto': UI.pickDay=t.dataset.d; renderModal(); break;
    case 'adddatedmeal': UI.pickDay=t.dataset.date; renderModal(); break;
    case 'confirmpick':
      if(UI.pickDay.length===10){ if(!Array.isArray(S.dateMeals[UI.pickDay]))S.dateMeals[UI.pickDay]=[];S.dateMeals[UI.pickDay].push(t.dataset.id); }
      else S.week[UI.pickDay].push(t.dataset.id);
      UI.pickDay=null; save(); render(); break;
    case 'rmdatedmeal': {const date=t.dataset.date;if(!Array.isArray(S.dateMeals[date]))S.dateMeals[date]=[...mealsForDate(date)];S.dateMeals[date].splice(+t.dataset.i,1);save();render();break;}
    case 'rmweek': S.week[t.dataset.d].splice(+t.dataset.i,1); save(); render(); break;
    case 'detplus': UI.detServings=(UI.detServings||1)+1; renderModal(); break;
    case 'detminus': UI.detServings=Math.max(1,(UI.detServings||2)-1); renderModal(); break;
    case 'filter': UI.filter=t.dataset.f; render(); break;
    case 'check': S.checked[t.dataset.key]=!S.checked[t.dataset.key]; save(); render(); break;
    case 'clearchecked': S.checked={}; save(); render(); break;
    case 'cnext': gotoStep(COOK.step+1); break;
    case 'cprev': gotoStep(COOK.step-1); break;
    case 'cookclose': clearTimer(); COOK=null; renderCook(); break;
    case 'tstart': toggleTimer(); break;
    case 'treset': resetTimer(); break;
  }
});
</script>
<button id="installBtn" hidden>Add to home screen</button>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch((err) => console.warn('SW registration failed:', err));
    });
  }
  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.hidden = false;
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.hidden = true;
  });
  window.addEventListener('appinstalled', () => { installBtn.hidden = true; });
</script>
